server:
  port: 8887

spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  redis:
    host: localhost
    port: 6379

# 自定义配置
wsb:
  mq:
    fanout-exchange: UpdateView           # 监听 Controller 的 REFRESH_ALL 广播
    controller-cmd-queue: ControllerCmd    # 向 Controller 发送命令的路由键
  redis:
    car-key-prefix: Car                    # 小车 Key 前缀（Car001:Position, Car001:Status...）
